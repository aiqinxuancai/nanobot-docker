name: Build and Publish nanobot

on:
  schedule:
    # 09:00 Asia/Shanghai == 01:00 UTC
    - cron: "0 1 * * *"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: build-nanobot
  cancel-in-progress: false

env:
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/nanobot
  SOURCE_REPOSITORY: HKUDS/nanobot

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out upstream source
        uses: actions/checkout@v4
        with:
          repository: ${{ env.SOURCE_REPOSITORY }}
          ref: main
          path: source
          fetch-depth: 1

      - name: Extract image metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          cd source

          version="$(python - <<'PY'
          from pathlib import Path
          import re

          content = Path("pyproject.toml").read_text(encoding="utf-8")
          match = re.search(r'^version\s*=\s*"([^"]+)"', content, re.MULTILINE)
          print(match.group(1) if match else "")
          PY
          )"
          short_sha="$(git rev-parse --short HEAD)"
          commit_sha="$(git rev-parse HEAD)"
          build_date="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          date_tag="$(date -u +%Y%m%d)"

          {
            echo "version=$version"
            echo "short_sha=$short_sha"
            echo "commit_sha=$commit_sha"
            echo "build_date=$build_date"
            echo "date_tag=$date_tag"
          } >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate Docker tags and labels
        id: docker_meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=raw,value=${{ steps.meta.outputs.version }},enable=${{ steps.meta.outputs.version != '' }}
            type=raw,value=${{ steps.meta.outputs.date_tag }}
            type=raw,value=sha-${{ steps.meta.outputs.short_sha }}
          labels: |
            org.opencontainers.image.title=nanobot
            org.opencontainers.image.description=Daily build of HKUDS/nanobot
            org.opencontainers.image.source=https://github.com/${{ env.SOURCE_REPOSITORY }}
            org.opencontainers.image.revision=${{ steps.meta.outputs.commit_sha }}
            org.opencontainers.image.created=${{ steps.meta.outputs.build_date }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: source
          file: source/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.docker_meta.outputs.tags }}
          labels: ${{ steps.docker_meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
